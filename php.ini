; Custom PHP configuration for Onwynd API
; This file enables required extensions for Laravel

; Enable PDO MySQL extension
extension=pdo_mysql
extension=mysqli

; Enable other commonly needed extensions
extension=openssl
extension=curl
extension=mbstring
extension=tokenizer
extension=xml
extension=json
extension=zip
extension=gd
extension=fileinfo

; Set appropriate memory and execution limits
memory_limit=256M
max_execution_time=300
upload_max_filesize=50M
post_max_size=50M

; Set timezone
date.timezone=UTC

; Error reporting for development
error_reporting=E_ALL
display_errors=On
display_startup_errors=On
log_errors=On